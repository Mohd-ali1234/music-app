buildscript {
  repositories { google(); mavenCentral() }
  dependencies { classpath "com.chaquo.python:gradle:17.0.0" }
}
plugins { id 'com.android.library'; id 'expo-module-gradle-plugin' }
apply plugin: 'com.chaquo.python'
group = 'expo.modules.nativestreamresolver'
version = '1.0.0'
android {
  namespace "expo.modules.nativestreamresolver"
  defaultConfig {
    minSdkVersion 24
    ndk { abiFilters "armeabi-v7a", "arm64-v8a", "x86_64" }
  }
}
repositories { mavenCentral() }
chaquopy {
  defaultConfig {
    version = "3.11"
    pip { install "yt-dlp==2026.6.9" }
  }
}
